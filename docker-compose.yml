version: '3.8'

# Docker Compose for full stack:
# - RabbitMQ, SQL Server (infrastructure)
# - OrderService, InventoryService, PaymentService (microservices)
# - UI (React frontend served by nginx)
#
# Run local infra only: docker compose up -d rabbitmq sqlserver
# Run full stack (after CI build): IMAGE_TAG=v1.0.0 DOCKER_REGISTRY=microservice-demo docker compose up -d

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: microservice-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - microservice-net

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: microservice-sqlserver
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: "YourStr0ngP@ssword!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - microservice-net

  order-service:
    image: ${DOCKER_REGISTRY:-microservice-demo}/order-service:${IMAGE_TAG:-latest}
    container_name: microservice-order
    depends_on:
      - rabbitmq
      - sqlserver
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__OrderDb: "Server=sqlserver,1433;Database=OrderDb;User Id=sa;Password=YourStr0ngP@ssword!;TrustServerCertificate=true"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
    networks:
      - microservice-net
    restart: unless-stopped

  inventory-service:
    image: ${DOCKER_REGISTRY:-microservice-demo}/inventory-service:${IMAGE_TAG:-latest}
    container_name: microservice-inventory
    depends_on:
      - rabbitmq
      - sqlserver
    ports:
      - "5003:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__InventoryDb: "Server=sqlserver,1433;Database=InventoryDb;User Id=sa;Password=YourStr0ngP@ssword!;TrustServerCertificate=true"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
    networks:
      - microservice-net
    restart: unless-stopped

  payment-service:
    image: ${DOCKER_REGISTRY:-microservice-demo}/payment-service:${IMAGE_TAG:-latest}
    container_name: microservice-payment
    depends_on:
      - rabbitmq
      - sqlserver
    ports:
      - "5036:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__PaymentDb: "Server=sqlserver,1433;Database=PaymentDb;User Id=sa;Password=YourStr0ngP@ssword!;TrustServerCertificate=true"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
    networks:
      - microservice-net
    restart: unless-stopped

  ui:
    image: ${DOCKER_REGISTRY:-microservice-demo}/ui:${IMAGE_TAG:-latest}
    container_name: microservice-ui
    depends_on:
      - order-service
      - inventory-service
      - payment-service
    ports:
      - "9080:80"
    networks:
      - microservice-net
    restart: unless-stopped

networks:
  microservice-net:
    driver: bridge

volumes:
  rabbitmq-data:
  sqlserver-data:

