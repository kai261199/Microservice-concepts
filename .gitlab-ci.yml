# GitLab CI/CD Pipeline - MicroserviceDemo
# Runs only on tags (e.g. git tag v1.0.0 && git push --tags)
# Runner: self-hosted Linux with shell executor, Docker required

variables:
  DOTNET_SDK_IMAGE: "mcr.microsoft.com/dotnet/sdk:8.0"
  NODE_IMAGE: "node:20-alpine"
  DOCKER_REGISTRY: "${CI_REGISTRY}"
  IMAGE_TAG: "${CI_COMMIT_TAG}"
  DEPLOY_PATH: "/opt/microservice-demo"

workflow:
  rules:
    - if: $CI_COMMIT_TAG

stages:
  - build
  - test
  - docker-build
  - deploy

# Stage 1: BUILD

build-dotnet:
  stage: build
  tags:
    - gitlab-server
  script:
    - docker run --rm -v "$PWD":/src -w /src $DOTNET_SDK_IMAGE
      dotnet restore MicroserviceDemo.slnx
    - docker run --rm -v "$PWD":/src -w /src $DOTNET_SDK_IMAGE
      dotnet build MicroserviceDemo.slnx --configuration Release --no-restore

build-ui:
  stage: build
  tags:
    - gitlab-server
  script:
    - docker run --rm -v "$PWD/ui":/app -w /app $NODE_IMAGE sh -c "npm ci && npm run build"
  artifacts:
    paths:
      - ui/dist/
    expire_in: 1 hour

# Stage 2: TEST

test-dotnet:
  stage: test
  tags:
    - gitlab-server
  needs:
    - build-dotnet
  script:
    - docker run --rm -v "$PWD":/src -w /src $DOTNET_SDK_IMAGE
      dotnet test MicroserviceDemo.slnx --configuration Release --verbosity normal || true
  allow_failure: true

# Stage 3: DOCKER BUILD

docker-build-order:
  stage: docker-build
  tags:
    - gitlab-server
  needs:
    - build-dotnet
    - test-dotnet
  script:
    - docker build
      -f src/OrderService/Dockerfile
      -t ${DOCKER_REGISTRY}/order-service:${IMAGE_TAG}
      -t ${DOCKER_REGISTRY}/order-service:latest
      .

docker-build-inventory:
  stage: docker-build
  tags:
    - gitlab-server
  needs:
    - build-dotnet
    - test-dotnet
  script:
    - docker build
      -f src/InventoryService/Dockerfile
      -t ${DOCKER_REGISTRY}/inventory-service:${IMAGE_TAG}
      -t ${DOCKER_REGISTRY}/inventory-service:latest
      .

docker-build-payment:
  stage: docker-build
  tags:
    - gitlab-server
  needs:
    - build-dotnet
    - test-dotnet
  script:
    - docker build
      -f src/PaymentService/Dockerfile
      -t ${DOCKER_REGISTRY}/payment-service:${IMAGE_TAG}
      -t ${DOCKER_REGISTRY}/payment-service:latest
      .

docker-build-ui:
  stage: docker-build
  tags:
    - gitlab-server
  needs:
    - build-ui
  script:
    - docker build
      -f ui/Dockerfile
      -t ${DOCKER_REGISTRY}/ui:${IMAGE_TAG}
      -t ${DOCKER_REGISTRY}/ui:latest
      .

# Stage 4: DEPLOY 

deploy:
  stage: deploy
  tags:
    - gitlab-server
  needs:
    - docker-build-order
    - docker-build-inventory
    - docker-build-payment
    - docker-build-ui
  variables:
    DEPLOY_USER: "kvi"
    DEPLOY_HOST: "192.168.248.100"
  script:
    - echo "── Deploying version ${IMAGE_TAG} to ${DEPLOY_HOST} ──"
    - scp docker-compose.yml ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/
    - ssh ${DEPLOY_USER}@${DEPLOY_HOST} "
        cd ${DEPLOY_PATH} &&
        export IMAGE_TAG=${IMAGE_TAG} &&
        export DOCKER_REGISTRY=${DOCKER_REGISTRY} &&
        docker compose pull &&
        docker compose up -d --remove-orphans"
    - echo "── Deploy completed! Tag ${IMAGE_TAG} ──"
  environment:
    name: production
    url: http://192.168.248.100
  when: manual