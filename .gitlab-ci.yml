# GitLab CI/CD Pipeline - MicroserviceDemo
# Runs only on tags (e.g. git tag v1.0.0 && git push --tags)
# Runner: self-hosted Linux with shell executor (running as root), Docker required

variables:
  DOTNET_SDK_IMAGE: "mcr.microsoft.com/dotnet/sdk:9.0"
  NODE_IMAGE: "node:20-alpine"
  DOCKER_REGISTRY: "microservice-demo"
  IMAGE_TAG: "${CI_COMMIT_TAG}"
  DEPLOY_PATH: "/opt/microservice-demo"

workflow:
  rules:
    - if: $CI_COMMIT_TAG

stages:
  - build
  - test
  - docker-build
  - deploy

default:
  tags:
    - gitlab-server
  after_script:
    - docker run --rm -v "$CI_PROJECT_DIR":/w alpine chown -R "$(id -u):$(id -g)" /w 2>/dev/null || true

# Stage 1: BUILD

build-dotnet:
  stage: build
  script:
    - docker run --rm --network host -v "$PWD":/src -w /src $DOTNET_SDK_IMAGE
      sh -c "dotnet restore MicroserviceDemo.slnx && dotnet build MicroserviceDemo.slnx -c Release --no-restore"

build-ui:
  stage: build
  script:
    - docker run --rm --network host -v "$PWD/ui":/app -w /app $NODE_IMAGE
      sh -c "npm ci && npm run build"
  artifacts:
    paths:
      - ui/dist/
    expire_in: 1 hour

# Stage 2: TEST

test-dotnet:
  stage: test
  needs:
    - build-dotnet
  script:
    - docker run --rm --network host -v "$PWD":/src -w /src $DOTNET_SDK_IMAGE
      dotnet test MicroserviceDemo.slnx -c Release --verbosity normal || true
  allow_failure: true

# Stage 3: DOCKER BUILD

docker-build-order:
  stage: docker-build
  tags:
    - gitlab-server
  needs:
    - build-dotnet
    - test-dotnet
  script:
    - docker build --network host
      -f src/OrderService/Dockerfile
      -t ${DOCKER_REGISTRY}/order-service:${IMAGE_TAG}
      -t ${DOCKER_REGISTRY}/order-service:latest
      .

docker-build-inventory:
  stage: docker-build
  tags:
    - gitlab-server
  needs:
    - build-dotnet
    - test-dotnet
  script:
    - docker build --network host
      -f src/InventoryService/Dockerfile
      -t ${DOCKER_REGISTRY}/inventory-service:${IMAGE_TAG}
      -t ${DOCKER_REGISTRY}/inventory-service:latest
      .

docker-build-payment:
  stage: docker-build
  tags:
    - gitlab-server
  needs:
    - build-dotnet
    - test-dotnet
  script:
    - docker build --network host
      -f src/PaymentService/Dockerfile
      -t ${DOCKER_REGISTRY}/payment-service:${IMAGE_TAG}
      -t ${DOCKER_REGISTRY}/payment-service:latest
      .

docker-build-ui:
  stage: docker-build
  tags:
    - gitlab-server
  needs:
    - build-ui
  script:
    - docker build --network host
      -f ui/Dockerfile
      -t ${DOCKER_REGISTRY}/ui:${IMAGE_TAG}
      -t ${DOCKER_REGISTRY}/ui:latest
      .
# Stage 4: DEPLOY 

deploy:
  stage: deploy
  tags:
    - gitlab-server
  needs:
    - docker-build-order
    - docker-build-inventory
    - docker-build-payment
    - docker-build-ui
  script:
    - echo "── Deploying version ${IMAGE_TAG} locally ──"
    - export IMAGE_TAG=${IMAGE_TAG}
    - export DOCKER_REGISTRY=${DOCKER_REGISTRY}
    - docker compose -f docker-compose.yml up -d --remove-orphans
    - echo "── Deploy completed! Access at http://kvi.microservice.tech ──"
  environment:
    name: production
    url: http://kvi.microservice.tech
  when: manual